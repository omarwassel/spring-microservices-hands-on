spring.application.name=spring-microservices-hands-on

jwt_secret_key=springMicroServicesHandsOnJwtSecretKeyWithSomeMoreCharsSpringMicroServicesHandsOnJwtSecretKeyWithSomeMoreChars
jwt_expiry_ms=86400000

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5431/mydatabase
spring.datasource.username=myuser
spring.datasource.password=mysecretpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional: Connection Pooling (Hikari)
#spring.datasource.hikari.maximum-pool-size=10